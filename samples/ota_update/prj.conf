CONFIG_SYNAPTIC=y
CONFIG_SYNAPTIC_PROFILING=y
CONFIG_LOG=y
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# OTA transfer arrives over the shell UART (syn ota begin/data/done);
# the command buffer bounds the hex chunk size: 1024-byte payloads
# are 2048 hex chars + command prefix.
CONFIG_SHELL=y
CONFIG_SYNAPTIC_SHELL=y
CONFIG_SHELL_CMD_BUFF_SIZE=2320
# absorb hex chunk bursts without dropping bytes
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=1024
