# SynapticOS dual_model remote (CPU1 application core)
CONFIG_SYNAPTIC=y
CONFIG_SECOND_CORE_MCUX=y

# CPU1 does not run the AI runtime: no NPU, no PowerQuad, minimal arena
CONFIG_SYNAPTIC_POWERQUAD=n
CONFIG_SYNAPTIC_TENSOR_ARENA_SIZE=4096
CONFIG_SYNAPTIC_SCRATCH_POOL_SIZE=1024

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096
