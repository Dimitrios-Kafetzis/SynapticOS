# Dual-core operation: CPU0 runs the AI runtime and releases CPU1
CONFIG_SECOND_CORE_MCUX=y
CONFIG_SHELL=y
CONFIG_SYNAPTIC_SHELL=y

# Flash support pulls in the MCX ROM-API flash HAL, used for the
# CPU1-image blank check before release: releasing CPU1 into erased
# flash wedges the whole chip (ECC bus error on the vector fetch
# stalls the shared flash system). Note: CHECK_BEFORE_READING is
# LPC55-only in Zephyr 3.7; the blank check uses the ROM API instead.
CONFIG_FLASH=y
